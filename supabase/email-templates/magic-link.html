<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Sign in — Waterview</title>
</head>
<body style="margin: 0; padding: 0; width: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-size: 14px; line-height: 1.5; color: #475569; background-color: #f0f9ff; -webkit-font-smoothing: antialiased;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #f0f9ff; min-height: 100vh;">
    <tr>
      <td align="center" style="padding: 40px 24px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width: 480px; background-color: #ffffff; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(2, 132, 199, 0.06), 0 2px 4px -2px rgba(2, 132, 199, 0.04);">
          <tr>
            <td style="height: 4px; background: linear-gradient(90deg, #0ea5e9 0%, #0284c7 100%); border-radius: 12px 12px 0 0;"></td>
          </tr>
          <tr>
            <td style="padding: 32px 32px 24px; text-align: center; background-color: #f8fafc; border-bottom: 1px solid #e2e8f0;">
              <a href="{{ .SiteURL }}" style="text-decoration: none;">
                <img src="{{ .SiteURL }}/logo.png" alt="Waterview" width="128" height="34" style="display: inline-block; max-width: 128px; height: auto;" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';">
                <span style="display: none; font-size: 20px; font-weight: 700; color: #0284c7; letter-spacing: -0.02em;">Waterview</span>
              </a>
              <p style="margin: 6px 0 0; font-size: 11px; font-weight: 500; color: #64748b; letter-spacing: 0.05em; text-transform: uppercase;">Pool Monitoring</p>
            </td>
          </tr>
          <tr>
            <td style="padding: 32px;">
              <h1 style="margin: 0 0 12px; font-size: 20px; font-weight: 600; color: #0f172a; letter-spacing: -0.02em;">Sign in to Waterview</h1>
              <p style="margin: 0 0 28px; font-size: 15px; line-height: 1.6; color: #475569;">Click the button below to sign in. This link expires soon and can only be used once.</p>
              <table role="presentation" cellspacing="0" cellpadding="0" align="center">
                <tr>
                  <td style="border-radius: 8px; background-color: #0ea5e9;">
                    <a href="{{ .ConfirmationURL }}" style="display: inline-block; padding: 12px 24px; font-size: 14px; font-weight: 600; color: #ffffff; text-decoration: none;">Sign in</a>
                  </td>
                </tr>
              </table>
              <p style="margin: 28px 0 0; padding-top: 24px; border-top: 1px solid #e2e8f0; font-size: 13px; color: #64748b;">If you didn't request this, you can safely ignore this email.</p>
            </td>
          </tr>
          <tr>
            <td style="padding: 20px 32px; background-color: #f8fafc; border-top: 1px solid #e2e8f0; border-radius: 0 0 12px 12px;">
              <p style="margin: 0; font-size: 12px; color: #64748b; text-align: center;">Waterview — IoT-based pool monitoring</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
